<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Man Reading Mission!</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e02020;
    --darkred: #8b0000;
    --blue: #1a3a8f;
    --darkblue: #0d1f4f;
    --white: #f5f5f5;
    --yellow: #FFD700;
    --webgray: rgba(255,255,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--darkblue);
    min-height: 100vh;
    overflow-x: hidden;
    color: white;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><circle cx='10' cy='10' r='4' fill='%23e02020'/><circle cx='10' cy='10' r='2' fill='white'/></svg>") 10 10, auto;
  }

  /* ── WEB BACKGROUND ── */
  .web-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .web-bg svg {
    position: absolute;
    opacity: 0.06;
  }

  /* City skyline silhouette */
  .city {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    z-index: 0;
    pointer-events: none;
  }

  /* Spider hanging from top */
  .spider-hang {
    position: fixed;
    top: 0;
    right: 60px;
    z-index: 2;
    pointer-events: none;
    animation: hangSwing 4s ease-in-out infinite;
    transform-origin: top center;
  }

  .web-thread {
    width: 2px;
    background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
    margin: 0 auto;
    border-radius: 1px;
    animation: threadStretch 4s ease-in-out infinite;
  }

  .spider-emoji {
    font-size: 2.8rem;
    display: block;
    text-align: center;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  }

  @keyframes hangSwing {
    0%,100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  @keyframes threadStretch {
    0%,100% { height: 120px; }
    50% { height: 140px; }
  }

  /* Floating web dots */
  .web-dot {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    pointer-events: none;
    animation: floatDot linear infinite;
    z-index: 0;
  }

  @keyframes floatDot {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  /* ── LAYOUT ── */
  .game-container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 16px 16px 80px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 8px 0 14px;
    position: relative;
  }

  .header-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 0.85rem;
    letter-spacing: 2px;
    padding: 4px 14px;
    border-radius: 50px;
    margin-bottom: 6px;
    box-shadow: 0 2px 10px rgba(224,32,32,0.5);
  }

  h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    letter-spacing: 3px;
    line-height: 1;
    color: var(--white);
    text-shadow: 3px 3px 0 var(--darkred), 6px 6px 0 rgba(0,0,0,0.3);
    margin-bottom: 2px;
  }

  h1 span { color: var(--red); }

  .subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── HEALTH / SCORE BAR ── */
  .hud {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    padding: 10px 18px;
    backdrop-filter: blur(8px);
  }

  .score-pill {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    color: var(--yellow);
    letter-spacing: 1px;
    white-space: nowrap;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  .xp-track {
    flex: 1;
    height: 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 50px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), #ff6b6b);
    border-radius: 50px;
    width: 0%;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px rgba(224,32,32,0.6);
  }

  .q-pill {
    font-weight: 900;
    color: rgba(255,255,255,0.4);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  /* ── MODE TABS ── */
  .mode-tabs {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }

  @media (max-width: 480px) {
    .mode-tabs { grid-template-columns: repeat(3, 1fr); }
  }

  .tab-btn {
    font-family: 'Bangers', cursive;
    font-size: 0.78rem;
    letter-spacing: 0.5px;
    padding: 10px 4px;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.4);
    transition: all 0.2s;
    text-align: center;
    line-height: 1.4;
    backdrop-filter: blur(4px);
  }

  .tab-btn:hover { border-color: rgba(224,32,32,0.5); color: rgba(255,255,255,0.8); }
  .tab-btn.active { border-color: var(--red); color: var(--yellow); background: rgba(224,32,32,0.15); box-shadow: 0 0 12px rgba(224,32,32,0.3); }

  /* ── CARD ── */
  .card {
    background: linear-gradient(145deg, rgba(26,58,143,0.7), rgba(13,31,79,0.9));
    border-radius: 24px;
    padding: 26px 22px;
    border: 2px solid rgba(224,32,32,0.3);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }

  /* Web corner decorations on card */
  .card::before {
    content: '';
    position: absolute;
    top: -30px; left: -30px;
    width: 100px; height: 100px;
    background: radial-gradient(circle at 0% 0%, rgba(224,32,32,0.15), transparent 70%);
    pointer-events: none;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: -30px; right: -30px;
    width: 100px; height: 100px;
    background: radial-gradient(circle at 100% 100%, rgba(224,32,32,0.1), transparent 70%);
    pointer-events: none;
  }

  .prompt-label {
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  /* ── QUESTION DISPLAYS ── */
  .big-word {
    font-family: 'Bangers', cursive;
    font-size: clamp(3rem, 14vw, 6.5rem);
    letter-spacing: 8px;
    margin: 8px 0 12px;
    display: inline-block;
    animation: webShoot 0.5s cubic-bezier(.36,1.56,.64,1);
    text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  }

  @keyframes webShoot {
    0% { transform: scale(0.4) translateY(-20px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .heart-word-display {
    font-family: 'Bangers', cursive;
    font-size: clamp(3.5rem, 16vw, 8rem);
    letter-spacing: 8px;
    color: var(--red);
    text-shadow: 3px 3px 0 var(--darkred), 0 0 30px rgba(224,32,32,0.4);
    animation: webShoot 0.5s cubic-bezier(.36,1.56,.64,1);
    display: block;
    margin: 10px 0;
  }

  .sentence-display {
    font-size: clamp(1.1rem, 4vw, 1.45rem);
    line-height: 1.9;
    color: rgba(255,255,255,0.9);
    margin: 10px 0 12px;
    padding: 16px 18px;
    background: rgba(0,0,0,0.35);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    animation: webShoot 0.4s ease;
  }

  .blank-slot {
    display: inline-block;
    min-width: 110px;
    border-bottom: 3px solid var(--yellow);
    color: var(--yellow);
    font-weight: 900;
    padding: 0 6px;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  .pattern-display {
    font-family: 'Bangers', cursive;
    font-size: clamp(4rem, 18vw, 8rem);
    letter-spacing: 10px;
    color: var(--yellow);
    text-shadow: 4px 4px 0 rgba(200,150,0,0.5), 0 0 40px rgba(255,215,0,0.3);
    animation: webShoot 0.5s cubic-bezier(.36,1.56,.64,1);
    margin: 6px 0;
  }

  .sound-hint {
    color: rgba(255,255,255,0.4);
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    letter-spacing: 3px;
    margin-top: -6px;
    margin-bottom: 8px;
  }

  .chain-display {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.1rem, 4.5vw, 1.7rem);
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
    padding: 16px;
    background: rgba(0,0,0,0.35);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.07);
    margin: 8px 0 12px;
    animation: webShoot 0.4s ease;
    line-height: 1.7;
  }

  .chain-word { color: #60a5fa; }
  .chain-q { color: var(--yellow); font-size: 1.5em; text-shadow: 0 0 10px rgba(255,215,0,0.6); }

  /* ── CHOICES ── */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }

  .choice-btn {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.2rem, 5vw, 1.9rem);
    letter-spacing: 2px;
    padding: 16px 10px;
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    background: rgba(0,0,0,0.3);
    cursor: pointer;
    transition: all 0.15s;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
    pointer-events: none;
  }

  .choice-btn:hover:not(:disabled) {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--red);
    box-shadow: 0 8px 20px rgba(224,32,32,0.3);
    background: rgba(224,32,32,0.15);
  }

  .choice-btn.correct {
    background: rgba(34,197,94,0.2) !important;
    border-color: #22c55e !important;
    color: #86efac;
    box-shadow: 0 0 20px rgba(34,197,94,0.3);
    animation: correctWeb 0.5s ease;
  }

  .choice-btn.wrong {
    background: rgba(239,68,68,0.2) !important;
    border-color: #ef4444 !important;
    color: #fca5a5;
    animation: wrongShake 0.4s ease;
  }

  @keyframes correctWeb {
    0%,100% { transform: scale(1); }
    40% { transform: scale(1.08); }
  }

  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* ── FEEDBACK ── */
  .feedback {
    font-family: 'Bangers', cursive;
    font-size: 1.4rem;
    letter-spacing: 1px;
    margin-top: 14px;
    min-height: 2rem;
  }

  .feedback.good { color: #4ade80; text-shadow: 0 0 10px rgba(74,222,128,0.4); }
  .feedback.bad { color: #f87171; }

  /* ── NEXT BUTTON ── */
  .next-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    letter-spacing: 2px;
    padding: 13px 36px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--red), #c01010);
    color: white;
    cursor: pointer;
    margin-top: 14px;
    box-shadow: 0 6px 20px rgba(224,32,32,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.15s;
    display: none;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  .next-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(224,32,32,0.5); }
  .next-btn:active { transform: translateY(1px); }

  /* ── SOUND TOGGLE ── */
  .sound-toggle {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.5);
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sound-toggle:hover { border-color: var(--yellow); color: var(--yellow); }
  .sound-toggle.on { border-color: var(--yellow); color: var(--yellow); background: rgba(255,215,0,0.1); }
  .sound-toggle .toggle-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.2s;
  }
  .sound-toggle.on .toggle-dot { background: var(--yellow); box-shadow: 0 0 6px rgba(255,215,0,0.8); }

  /* Speaker button on question words */
  .speak-btn {
    background: none;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    width: 40px; height: 40px;
    font-size: 1.1rem;
    cursor: pointer;
    margin-left: 10px;
    vertical-align: middle;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: white;
    flex-shrink: 0;
  }
  .speak-btn:hover { border-color: var(--yellow); transform: scale(1.1); background: rgba(255,215,0,0.1); }
  .speak-btn.speaking { border-color: var(--yellow); background: rgba(255,215,0,0.15); animation: speakPulse 0.6s ease infinite alternate; }

  @keyframes speakPulse {
    from { box-shadow: 0 0 0 0 rgba(255,215,0,0.4); }
    to   { box-shadow: 0 0 0 8px rgba(255,215,0,0); }
  }

  /* Choice speak buttons */
  .choice-speak {
    font-size: 0.9rem;
    opacity: 0.5;
    margin-left: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
    vertical-align: middle;
  }
  .choice-speak:hover { opacity: 1; }

  /* Auto-read indicator */
  .autoread-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--yellow), var(--red));
    border-radius: 2px;
    margin-bottom: 14px;
    width: 0%;
    transition: width 0.05s linear;
  }

  /* ── STREAK / POWER UP ── */
  .streak-badge {
    position: fixed;
    top: 16px;
    left: 16px;
    background: linear-gradient(135deg, var(--red), var(--darkred));
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 50px;
    z-index: 10;
    display: none;
    box-shadow: 0 4px 15px rgba(224,32,32,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    animation: webShoot 0.4s ease;
  }

  /* ── WEB SHOOTERS (confetti) ── */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }

  .web-shot {
    position: absolute;
    pointer-events: none;
    animation: webFall linear forwards;
    font-size: 1rem;
  }

  @keyframes webFall {
    0% { transform: translateY(-30px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(540deg); opacity: 0; }
  }

  /* ── END SCREEN ── */
  .end-screen {
    display: none;
    text-align: center;
    padding: 10px 0;
  }

  .end-hero {
    font-size: 5rem;
    margin-bottom: 8px;
    animation: webShoot 0.6s cubic-bezier(.36,1.56,.64,1);
    display: block;
  }

  .end-screen h2 {
    font-family: 'Bangers', cursive;
    font-size: 2.8rem;
    letter-spacing: 3px;
    color: var(--yellow);
    text-shadow: 3px 3px 0 rgba(200,150,0,0.4);
    margin-bottom: 6px;
  }

  .end-score {
    font-family: 'Bangers', cursive;
    font-size: 4rem;
    letter-spacing: 4px;
    color: var(--red);
    text-shadow: 3px 3px 0 var(--darkred), 0 0 30px rgba(224,32,32,0.4);
    margin: 8px 0;
  }

  .end-message {
    color: rgba(255,255,255,0.5);
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .play-again-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    letter-spacing: 2px;
    padding: 15px 42px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--red), #c01010);
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(224,32,32,0.4);
    transition: all 0.15s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  .play-again-btn:hover { transform: translateY(-3px) scale(1.03); }

  /* ── PASSAGE STYLES ── */
  .passage-wrap {
    text-align: left;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 18px 20px;
    margin: 8px 0 14px;
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--red) rgba(0,0,0,0.2);
    animation: webShoot 0.4s ease;
  }

  .passage-wrap::-webkit-scrollbar { width: 6px; }
  .passage-wrap::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }

  .passage-title {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--yellow);
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(255,215,0,0.4);
  }

  .passage-text {
    font-size: clamp(0.95rem, 3.5vw, 1.1rem);
    line-height: 1.9;
    color: rgba(255,255,255,0.85);
    font-weight: 700;
  }

  .passage-text .highlight-ar {
    color: var(--yellow);
    text-shadow: 0 0 8px rgba(255,215,0,0.4);
    font-weight: 900;
  }

  .passage-text .highlight-hw {
    color: #f9a8d4;
    font-weight: 900;
  }

  .read-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
    padding: 10px 24px;
    border: 2px solid var(--yellow);
    border-radius: 50px;
    background: rgba(255,215,0,0.1);
    color: var(--yellow);
    cursor: pointer;
    margin-bottom: 10px;
    transition: all 0.2s;
  }

  .read-btn:hover { background: rgba(255,215,0,0.2); transform: scale(1.04); }

  .comp-question {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.1rem, 4.5vw, 1.6rem);
    letter-spacing: 1px;
    color: white;
    text-align: center;
    padding: 14px 16px;
    background: rgba(0,0,0,0.3);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    margin: 8px 0 12px;
    line-height: 1.5;
    animation: webShoot 0.4s ease;
  }

</style>
</head>
<body>

<!-- Background web pattern -->
<div class="web-bg">
  <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="web" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
        <!-- radial web lines -->
        <line x1="60" y1="60" x2="0"   y2="0"   stroke="white" stroke-width="0.8"/>
        <line x1="60" y1="60" x2="60"  y2="0"   stroke="white" stroke-width="0.8"/>
        <line x1="60" y1="60" x2="120" y2="0"   stroke="white" stroke-width="0.8"/>
        <line x1="60" y1="60" x2="120" y2="60"  stroke="white" stroke-width="0.8"/>
        <line x1="60" y1="60" x2="120" y2="120" stroke="white" stroke-width="0.8"/>
        <line x1="60" y1="60" x2="60"  y2="120" stroke="white" stroke-width="0.8"/>
        <line x1="60" y1="60" x2="0"   y2="120" stroke="white" stroke-width="0.8"/>
        <line x1="60" y1="60" x2="0"   y2="60"  stroke="white" stroke-width="0.8"/>
        <!-- concentric rings -->
        <circle cx="60" cy="60" r="18"  fill="none" stroke="white" stroke-width="0.6"/>
        <circle cx="60" cy="60" r="35"  fill="none" stroke="white" stroke-width="0.6"/>

<script>
// ── TEXT-TO-SPEECH ENGINE ─────────────────────────────────────
let soundOn = true;
let voices = [];
let barInterval = null;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  return voices.find(v =>
    (v.name.includes('Samantha') || v.name.includes('Karen') ||
     v.name.includes('Google US English') || v.name.includes('Daniel'))
    && v.lang.startsWith('en')
  ) || voices.find(v => v.lang.startsWith('en')) || voices[0];
}
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

// Phonics pronunciation overrides
const PRONOUNCE = {
  'ar':'arr sound', 'or':'or sound', 'er':'er sound',
  'ir · ur':'ir and ur sound — like bird and surf',
  'pretty':'pretty', 'nothing':'nothing', 'people':'people',
  'because':'because', 'move':'moov', 'friend':'frend',
  'other':'other', 'another':'another', 'mother':'mother', 'brother':'brother',
};

function speak(text, opts = {}) {
  if (!soundOn || !text) return;
  speechSynthesis.cancel();
  clearSpeakingUI();
  const clean = text.replace(/[^\w\s'?!,.\-–·]/gu, '').replace(/\s+/g,' ').trim();
  if (!clean) return;
  const utt = new SpeechSynthesisUtterance(PRONOUNCE[clean.toLowerCase()] || clean);
  utt.voice  = loadVoices();
  utt.rate   = opts.rate  || 0.82;
  utt.pitch  = opts.pitch || 1.05;
  utt.volume = 1;
  if (opts.btn) {
    opts.btn.classList.add('speaking');
    utt.onend = () => opts.btn && opts.btn.classList.remove('speaking');
  }
  speechSynthesis.speak(utt);
}

function clearSpeakingUI() {
  document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));
}

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('soundToggle');
  btn.classList.toggle('on', soundOn);
  document.getElementById('soundLabel').textContent = soundOn ? '🔊 SOUND ON' : '🔇 SOUND OFF';
  if (!soundOn) { speechSynthesis.cancel(); clearAnimBar(); }
  else speak("Sound on! Let's go!", { rate: 0.9 });
}

function animateBar(durationMs) {
  clearAnimBar();
  const bar = document.getElementById('autoreadBar');
  if (!bar) return;
  bar.style.width = '0%';
  let elapsed = 0;
  barInterval = setInterval(() => {
    elapsed += 50;
    bar.style.width = Math.min(100, (elapsed / durationMs) * 100) + '%';
    if (elapsed >= durationMs) clearAnimBar();
  }, 50);
}

function clearAnimBar() {
  if (barInterval) { clearInterval(barInterval); barInterval = null; }
  const bar = document.getElementById('autoreadBar');
  if (bar) bar.style.width = '0%';
}

// Chain multiple utterances for auto-read
function sayChain(parts) {
  if (!soundOn || !parts.length) return;
  speechSynthesis.cancel();
  clearSpeakingUI();
  const totalMs = parts.reduce((a, p) => a + (p.text.length / (p.rate || 0.82)) * 58, 0);
  animateBar(totalMs);
  let idx = 0;
  function next() {
    if (idx >= parts.length || !soundOn) return;
    const p = parts[idx++];
    const utt = new SpeechSynthesisUtterance(p.text);
    utt.voice  = loadVoices();
    utt.rate   = p.rate  || 0.82;
    utt.pitch  = p.pitch || 1.05;
    utt.volume = 1;
    utt.onend  = next;
    speechSynthesis.speak(utt);
  }
  next();
}

// Build auto-read script for each question type
function autoRead(q) {
  if (!soundOn) return;
  const promptText = q.prompt.replace(/[^a-zA-Z0-9 '?!,.\-]/g, '');
  const parts = [{ text: promptText, rate: 0.85 }];

  if (q.isHeart || q.kind === 'spell' || q.kind === 'decode') {
    parts.push({ text: q.display, rate: 0.6, pitch: 1.1 });
    parts.push({ text: 'again... ' + q.display, rate: 0.55, pitch: 1.1 });
  } else if (q.kind === 'jumble') {
    parts.push({ text: 'The mixed-up letters are... ' + q.display.split('').join('... '), rate: 0.65 });
  } else if (q.kind === 'sentence') {
    parts.push({ text: q.display.replace('______', 'blank'), rate: 0.78 });
  } else if (q.kind === 'pattern') {
    parts.push({ text: PRONOUNCE[q.display.toLowerCase()] || q.display, rate: 0.72, pitch: 1.15 });
    parts.push({ text: q.hint.replace(/[\/·]/g, '').replace(/\s+/g,' '), rate: 0.78 });
  } else if (q.kind === 'chain') {
    const ct = q.display.replace(/→/g, ' then ').replace('?', '. What comes next?');
    parts.push({ text: ct, rate: 0.78 });
  } else if (q.kind === 'comprehension') {
    parts.push({ text: q.q, rate: 0.82 });
  }

  parts.push({ text: 'Now pick your answer', rate: 0.88 });
  sayChain(parts);
}

// Speak a single answer choice
function speakChoice(text, btn) {
  if (!soundOn) return;
  speechSynthesis.cancel();
  clearSpeakingUI();
  const utt = new SpeechSynthesisUtterance(PRONOUNCE[text.toLowerCase()] || text);
  utt.voice  = loadVoices();
  utt.rate   = 0.7;
  utt.pitch  = 1.1;
  utt.volume = 1;
  if (btn) {
    btn.classList.add('speaking');
    utt.onend = () => btn.classList.remove('speaking');
  }
  speechSynthesis.speak(utt);
}

const TOTAL = 10;
let mode = 'heartwords', currentQuestion = 0, score = 0, streak = 0, answered = false, questions = [];

const shuffle = a => [...a].sort(() => Math.random() - 0.5);
const pick    = (a, n) => shuffle(a).slice(0, n);
const rand    = a => a[Math.floor(Math.random() * a.length)];

// ── QUESTION BUILDERS ─────────────────────────────────────────
function buildHeartWordQuestions() {
  const words = shuffle(ALL_HEART_WORDS);
  return Array.from({ length: TOTAL }, (_, i) => {
    const w = words[i % words.length];
    const wrongs = pick(ALL_HEART_WORDS.filter(x => x !== w), 3);
    const t = i % 3;
    if (t === 0) {
      return { kind:'spell', answer:w, choices:shuffle([w,...wrongs]),
        prompt:'FIND THIS HEART WORD, SPIDER-HERO!', display:w.toUpperCase(), isHeart:true };
    } else if (t === 1 && ALL_SENTENCES[w]) {
      const sent = rand(ALL_SENTENCES[w]);
      const blanked = sent.replace(new RegExp(w,'i'), '______');
      return { kind:'sentence', answer:w, choices:shuffle([w,...wrongs]),
        prompt:'WHICH WORD COMPLETES THE SENTENCE?', display:blanked };
    } else {
      const jumbled = shuffle(w.split('')).join('').toUpperCase();
      return { kind:'jumble', answer:w, choices:shuffle([w,...wrongs]),
        prompt:'UNSCRAMBLE THE LETTERS!', display:jumbled };
    }
  });
}

function buildDecodeQuestions() {
  const all = [...DECODE_WEEK1, ...DECODE_WEEK2, ...DECODE_WEEK3];
  return shuffle(all).slice(0, TOTAL).map((w, i) => {
    const wrong = pick(all.filter(x => x !== w), 3);
    return { kind:'decode', answer:w, choices:shuffle([w,...wrong]),
      prompt: i%2===0 ? 'READ THIS WORD — THEN FIND IT!' : 'WHICH WORD IS SPELLED RIGHT?',
      display: w.toUpperCase() };
  });
}

function buildARQuestions() {
  const words = shuffle(AR_WORDS);
  return Array.from({ length: TOTAL }, (_, i) => {
    if (i % 3 === 2) {
      const chain = rand(AR_CHAINS);
      return { kind:'chain', answer:chain.answer, choices:shuffle(chain.choices),
        prompt:'COMPLETE THE WORD CHAIN!', display:chain.display };
    }
    const w = words[i % words.length];
    return { kind:'pattern', answer:w, choices:shuffle([w,...pick(OR_WORDS,3)]),
      prompt:'WHICH WORD HAS THE AR SOUND — LIKE "STAR"?', display:'AR', hint:'/ar/ like in CAR ⭐' };
  });
}

function buildORQuestions() {
  const words = shuffle(OR_WORDS);
  return Array.from({ length: TOTAL }, (_, i) => {
    if (i % 3 === 2) {
      const chain = rand(OR_CHAINS);
      return { kind:'chain', answer:chain.answer, choices:shuffle(chain.choices),
        prompt:'COMPLETE THE WORD CHAIN!', display:chain.display };
    }
    const w = words[i % words.length];
    return { kind:'pattern', answer:w, choices:shuffle([w,...pick(AR_WORDS,3)]),
      prompt:'WHICH WORD HAS THE OR SOUND — LIKE "STORE"?', display:'OR', hint:'/or/ like in STORE 🌆' };
  });
}

function buildERQuestions() {
  const words = shuffle(ER_WORDS);
  return Array.from({ length: TOTAL }, (_, i) => {
    if (i % 3 === 2) {
      const chain = rand(ER_CHAINS);
      return { kind:'chain', answer:chain.answer, choices:shuffle(chain.choices),
        prompt:'COMPLETE THE WORD CHAIN!', display:chain.display };
    }
    const w = words[i % words.length];
    return { kind:'pattern', answer:w, choices:shuffle([w,...pick([...AR_WORDS,...OR_WORDS],3)]),
      prompt:'WHICH WORD HAS THE ER SOUND — LIKE "FERN"?', display:'ER', hint:'/er/ like in FERN 🌿' };
  });
}

function buildIRURQuestions() {
  const words = shuffle(IRUR_WORDS);
  return Array.from({ length: TOTAL }, (_, i) => {
    if (i % 3 === 2) {
      const chain = rand(IRUR_CHAINS);
      return { kind:'chain', answer:chain.answer, choices:shuffle(chain.choices),
        prompt:'COMPLETE THE WORD CHAIN!', display:chain.display };
    }
    const w = words[i % words.length];
    return { kind:'pattern', answer:w, choices:shuffle([w,...pick([...AR_WORDS,...ER_WORDS],3)]),
      prompt:'WHICH WORD HAS THE IR or UR SOUND — LIKE "BIRD" or "SURF"?', display:'IR · UR', hint:'/ir/ · /ur/ like BIRD 🐦 · SURF 🏄' };
  });
}
function renderQuestion() {
  const q = questions[currentQuestion];
  answered = false;
  speechSynthesis.cancel();
  clearAnimBar();

  document.getElementById('qCounter').textContent = `${currentQuestion+1} / ${TOTAL}`;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('promptLabel').textContent = q.prompt;

  const area = document.getElementById('questionArea');
  const choicesEl = document.getElementById('choicesArea');

  // Helper: speaker button for main word/display
  const speakWordBtn = (word) =>
    `<button class="speak-btn" title="Hear this word" onclick="event.stopPropagation();speak('${word.replace(/'/g,"\\'")}',{rate:0.65,pitch:1.1,btn:this})">🔊</button>`;

  // Helper: choices with individual speaker buttons
  const makeChoices = (choices, answer, isText = false) => {
    const style = isText
      ? `font-family:'Nunito',sans-serif;font-size:clamp(0.8rem,3vw,0.95rem);letter-spacing:0;font-weight:900;padding:12px 8px;text-align:left;`
      : '';
    return choices.map(c => {
      const safeC = JSON.stringify(c);
      const safeA = JSON.stringify(answer);
      return `<button class="choice-btn" style="${style}" onclick="checkAnswer(this,${safeC},${safeA})">
        ${c} <span class="choice-speak" title="Hear this" onclick="event.stopPropagation();speakChoice('${c.replace(/'/g,"\\'").replace(/"/g,'\\"')}',this)">🔊</span>
      </button>`;
    }).join('');
  };

  if (q.isHeart) {
    area.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
        <span class="heart-word-display">${q.display}</span>
        ${speakWordBtn(q.answer)}
      </div>`;
    choicesEl.innerHTML = makeChoices(q.choices, q.answer);

  } else if (q.kind === 'passage-intro' || q.kind === 'comprehension') {
    let passageTitle, passageHTML, passageText;
    if (mode === 'passage2') {
      passageTitle = '🌿 MY SISTER\'S FERN — LESSON 80';
      passageHTML = PASSAGE2_HTML; passageText = PASSAGE2_TEXT;
    } else if (mode === 'passage3') {
      passageTitle = '🐢 A TURTLE CAN SURF! — LESSON 81';
      passageHTML = PASSAGE3_HTML; passageText = PASSAGE3_TEXT;
    } else {
      passageTitle = '🌱 THE GARDEN — LESSON 77';
      passageHTML = PASSAGE1_HTML; passageText = PASSAGE1_TEXT;
    }
    area.innerHTML = `
      <div class="passage-wrap">
        <div class="passage-title" style="display:flex;align-items:center;gap:8px;">
          ${passageTitle}
          <button class="speak-btn" style="font-size:0.9rem;width:32px;height:32px;" title="Read whole story aloud"
            onclick="speak(${JSON.stringify(passageText)},{rate:0.78,btn:this})">🔊</button>
        </div>
        <div class="passage-text">${passageHTML}</div>
      </div>
      <div style="font-size:0.72rem;color:rgba(255,255,255,0.3);margin:-8px 0 8px;font-weight:700;">
        ⭐ = pattern sound &nbsp;|&nbsp; 💗 = heart word
      </div>
      <div class="comp-question" style="display:flex;align-items:center;gap:8px;justify-content:center;">
        <span>${q.q}</span>
        ${speakWordBtn(q.q)}
      </div>`;
    choicesEl.innerHTML = makeChoices(q.choices, q.answer, true);
    setTimeout(() => autoRead(q), 400);
    return;

  } else if (q.kind === 'sentence') {
    const html = q.display.replace('______', '<span class="blank-slot">______</span>');
    area.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;justify-content:center;">
        <div class="sentence-display" style="flex:1">${html}</div>
        ${speakWordBtn(q.display.replace('______','blank'))}
      </div>`;
    choicesEl.innerHTML = makeChoices(q.choices, q.answer);

  } else if (q.kind === 'jumble') {
    area.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
        <div class="big-word" style="color:var(--yellow);letter-spacing:12px">${q.display}</div>
        ${speakWordBtn(q.display.split('').join(' '))}
      </div>`;
    choicesEl.innerHTML = makeChoices(q.choices, q.answer);

  } else if (q.kind === 'pattern') {
    area.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
        <div class="pattern-display">${q.display}</div>
        ${speakWordBtn(PRONOUNCE[q.display.toLowerCase()] || q.display)}
      </div>
      <div class="sound-hint">${q.hint}</div>`;
    choicesEl.innerHTML = makeChoices(q.choices, q.answer);

  } else if (q.kind === 'chain') {
    const parts = q.display.split('→');
    const chainHtml = parts.map((p, i) =>
      i < parts.length-1
        ? `<span class="chain-word">${p.trim()}</span> →`
        : ` <span class="chain-q">?</span>`
    ).join(' ');
    const chainSpeak = q.display.replace(/→/g,' then ').replace('?','what comes next?');
    area.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
        <div class="chain-display" style="flex:1">${chainHtml}</div>
        ${speakWordBtn(chainSpeak)}
      </div>`;
    choicesEl.innerHTML = makeChoices(q.choices, q.answer);

  } else {
    area.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
        <div class="big-word" style="color:var(--red)">${q.display}</div>
        ${speakWordBtn(q.answer)}
      </div>`;
    choicesEl.innerHTML = makeChoices(q.choices, q.answer);
  }

  // Auto-read after a short delay so rendering is done
  setTimeout(() => autoRead(q), 350);
}

function checkAnswer(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    btn.classList.add('correct');
    score += 10;
    streak++;
    document.getElementById('scoreBadge').textContent = `🕸️ ${score} PTS`;

    if (streak >= 3) {
      const sb = document.getElementById('streakBadge');
      sb.textContent = `🕸️ ${streak}x WEB STREAK!`;
      sb.style.display = 'block';
      setTimeout(() => sb.style.display = 'none', 2200);
    }

    fb.textContent = rand(CHEERS);
    fb.className = 'feedback good';
    const cheerText = fb.textContent.replace(/[^\w\s'!]/gu,'');
    speak(cheerText, { rate: 0.9, pitch: 1.2 });
    confettiBurst();
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent.trim() === correct) b.classList.add('correct');
    });
    fb.textContent = `The answer is "${correct.toUpperCase()}" — keep swinging! 🕷️`;
    fb.className = 'feedback bad';
    speak(`The answer is ${correct}. Keep swinging!`, { rate: 0.85 });
  }

  document.getElementById('xpFill').style.width = ((currentQuestion+1) / TOTAL * 100) + '%';
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= TOTAL) showEndScreen();
  else renderQuestion();
}

function showEndScreen() {
  document.getElementById('mainCard').style.display = 'none';
  const end = document.getElementById('endScreen');
  end.style.display = 'block';
  const pct = score / (TOTAL * 10) * 100;
  let hero, title, msg;
  if (pct === 100)     { hero='🏆'; title='PERFECT HERO!';      msg='Amazing-Fantasy level reading skills! You\'re incredible!'; }
  else if (pct >= 80)  { hero='🕷️'; title='SPECTACULAR!';       msg='Your Spidey-Sense for words is incredible!'; }
  else if (pct >= 60)  { hero='🌆'; title='FRIENDLY HERO!';     msg='Great swinging! Keep practicing your words!'; }
  else                 { hero='💪'; title='KEEP SWINGING!';     msg='Every hero starts somewhere — you\'re getting better!'; }
  document.getElementById('endHero').textContent = hero;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `${score} / ${TOTAL * 10}`;
  document.getElementById('endMessage').textContent = msg;
  confettiBurst(true);
  setTimeout(() => speak(`${title}! ${msg}`, { rate: 0.85, pitch: 1.1 }), 600);
}

function setMode(m) {
  mode = m;
  const modes = ['heartwords','decode','arpattern','orpattern','erpattern','irupattern','passage','passage2','passage3'];
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', modes[i] === m));
  startGame();
}

function startGame() {
  currentQuestion = 0; score = 0; streak = 0; answered = false;
  speechSynthesis.cancel();
  clearAnimBar();
  questions = mode === 'heartwords'  ? buildHeartWordQuestions()
            : mode === 'decode'      ? buildDecodeQuestions()
            : mode === 'arpattern'   ? buildARQuestions()
            : mode === 'orpattern'   ? buildORQuestions()
            : mode === 'erpattern'   ? buildERQuestions()
            : mode === 'irupattern'  ? buildIRURQuestions()
            : mode === 'passage'     ? buildPassageQuestions(PASSAGE1_QS)
            : mode === 'passage2'    ? buildPassageQuestions(PASSAGE2_QS)
            :                          buildPassageQuestions(PASSAGE3_QS);

  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('mainCard').style.display = 'block';
  document.getElementById('scoreBadge').textContent = '🕸️ 0 PTS';
  document.getElementById('xpFill').style.width = '0%';
  renderQuestion();
}

function confettiBurst(big = false) {
  const wrap = document.getElementById('confettiWrap');
  const symbols = big
    ? ['🕸️','⭐','🕷️','💥','✨','🔴','🔵','❤️','🌟']
    : ['🕸️','⭐','💥','✨'];
  const count = big ? 50 : 18;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'web-shot';
    el.textContent = rand(symbols);
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    el.style.animationDelay = (Math.random() * 0.7) + 's';
    el.style.animationDuration = (1 + Math.random() * 1) + 's';
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

startGame();
</script>
